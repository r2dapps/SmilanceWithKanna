name: Daily Morning Push Notification

on:
  schedule:
    # Trigger at 8:50 AM IST (3:20 AM UTC) every day
    - cron: '20 3 * * *'
  # Allows manual triggers from GitHub Actions UI
  workflow_dispatch:

jobs:
  send-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run push script
        env:
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
        run: npx tsx send-push.ts
